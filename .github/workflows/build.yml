name: Build OpenWrt
on: workflow_dispatch

env:
  OPENWRT_TAG: v24.10.5

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Maximize build space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 2048
        swap-size-mb: 1024
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'
        remove-docker-images: 'true'

    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.ref }}

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget ccache

    - name: Setup ccache
      uses: actions/cache@v4
      with:
        path: ~/.ccache
        key: ccache-mediatek-filogic-${{ env.OPENWRT_TAG }}-${{ github.sha }}
        restore-keys: |
          ccache-mediatek-filogic-${{ env.OPENWRT_TAG }}-
          ccache-mediatek-filogic-

    - name: Cache OpenWrt toolchain
      uses: actions/cache@v4
      with:
        path: |
          openwrt/staging_dir/toolchain-*
          openwrt/staging_dir/host
          openwrt/build_dir/toolchain-*
          openwrt/build_dir/host
        key: toolchain-mediatek-filogic-${{ env.OPENWRT_TAG }}-${{ hashFiles('build.sh') }}
        restore-keys: |
          toolchain-mediatek-filogic-${{ env.OPENWRT_TAG }}-

    - name: Cache OpenWrt downloads
      uses: actions/cache@v4
      with:
        path: openwrt/dl
        key: downloads-mediatek-filogic-${{ env.OPENWRT_TAG }}-${{ github.sha }}
        restore-keys: |
          downloads-mediatek-filogic-${{ env.OPENWRT_TAG }}-
          downloads-mediatek-filogic-

    - name: Configure ccache
      run: |
        ccache -M 2G
        ccache -z
        echo "PATH=/usr/lib/ccache:$PATH" >> $GITHUB_ENV

    - name: Build
      run: ./build.sh

    - name: Show ccache stats
      run: ccache -s

    - name: Archive production artifacts
      uses: actions/upload-artifact@v4
      with:
        name: openwrt-build-output
        path: output
