name: Build of OpenWrt Image for MR9000

on:
  schedule:
    - cron: '0 0 * * Sat'
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/GenericBuildWorkflow.yml
    with:
      workflow: Development
      repository: RolandoMagico/openwrt
      version: main
      device: MR9000
      rebase: true
