name: Build OpenWrt Image
run-name: Build ${{ inputs.repository }}, version ${{ inputs.version }} for device ${{ inputs.device }}

on:
  workflow_call:
    inputs:
      workflow:
        description: "The workflow which will be used"
        required: true
        type: string
      repository:
        description: "OpenWrt Repository"
        required: true
        type: string
      version:
        description: "OpenWrt version to build"
        required: true
        type: string
      device:
        description: "The device to build images for"
        required: true
        type: string
      ci_directory:
        description: "The directory where the CI repository will be checked out to"
        required: false
        type: string
        default: "CI"
      openwrt_directory:
        description: "The directory where the OpenWrt repository will be checked out to"
        required: false
        type: string
        default: "openwrt"
      rebase:
        description: "Rebase the branch before build"
        type: boolean
        default: false

jobs:
  execute:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Workflow Repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref }}
          path: ${{ inputs.ci_directory }}

      - name: Install Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
          gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
          python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: Determine repository branch
        id: determine_repo_branch
        run: |
          source ${{ inputs.ci_directory }}/${{ inputs.device }}/${{ inputs.version }}/device.settings
          echo openwrt_git_branch=$OPENWRT_GIT_BRANCH >> "$GITHUB_OUTPUT"
      - name: Checkout OpenWrt Repository
        run: git clone https://github.com/${{ inputs.repository }}.git -b ${{ steps.determine_repo_branch.outputs.openwrt_git_branch }} ${{ inputs.openwrt_directory }}

      - name: Set up git user
        if: ${{ inputs.workflow == 'Release' || inputs.rebase }}
        working-directory: ${{ inputs.openwrt_directory }}
        run: git config user.name "Hans Wurscht" && git config user.email "nobody@home.com"

      - name: Rebase
        if: ${{ inputs.rebase }}
        working-directory: ${{ inputs.openwrt_directory }}
        run: git rebase origin/${{ inputs.version }}

      - name: Apply git patch
        if: ${{ inputs.workflow == 'Release' }}
        working-directory: ${{ inputs.openwrt_directory }}
        run: git am ../${{ inputs.ci_directory }}/${{ inputs.device }}/${{ inputs.version }}/device.patch

      - name: Update Feeds
        working-directory: ${{ inputs.openwrt_directory }}
        run: ./scripts/feeds update -a

      - name: Install Feeds
        working-directory: ${{ inputs.openwrt_directory }}
        run: ./scripts/feeds install -a

      - name: Copy basic config
        if: ${{ inputs.workflow == 'Development' }}
        run: cp ${{ inputs.ci_directory }}/${{ inputs.device }}/${{ inputs.version }}/diffconfig ${{ inputs.openwrt_directory }}/.config

      - name: Create basic config
        if: ${{ inputs.workflow == 'Release' }}
        run: |
          source ${{ inputs.ci_directory }}/${{ inputs.device }}/${{ inputs.version }}/device.settings
          wget -O ${{ inputs.openwrt_directory }}/.config "https://downloads.openwrt.org/releases/${{ inputs.version }}/targets/$OPENWRT_TARGET_DIRECTORY/config.buildinfo"

      - name: Make default config
        working-directory: ${{ inputs.openwrt_directory }}
        run: make defconfig

      - name: Create vermagic
        if: ${{ inputs.workflow == 'Release' }}
        working-directory: ${{ inputs.openwrt_directory }}
        # The following command will probably fail, can be ignored. vermagic should be present afterwards anyway
        run: make target/linux/{clean,compile} || echo "Ignore errors, vermagic should still exist"

      - name: Compare vermagic
        if: ${{ inputs.workflow == 'Release' }}
        run: |
          source ${{ inputs.ci_directory }}/${{ inputs.device }}/${{ inputs.version }}/device.settings
          MANIFEST_FILE=openwrt-${{ inputs.version }}-${OPENWRT_TARGET_DIRECTORY//\//-}.manifest
          wget https://downloads.openwrt.org/releases/${{ inputs.version }}/targets/$OPENWRT_TARGET_DIRECTORY/$MANIFEST_FILE
          EXPECTED_VERMAGIC=$(grep '^kernel - ' "$MANIFEST_FILE" | grep -Eo '[0-9a-fA-F]{32}')
          CURRENT_VERMAGIC=$(find ${{ inputs.openwrt_directory }}/build_dir/ -name .vermagic -exec cat {} \;)
          if [ "$CURRENT_VERMAGIC" == "$EXPECTED_VERMAGIC" ]; then
            echo "Found expected vermagic $EXPECTED_VERMAGIC"
          else
            echo "Current vermagic $CURRENT_VERMAGIC differs from expected vermagic $EXPECTED_VERMAGIC"
            exit 1
          fi

      - name: Download packages
        if: ${{ inputs.workflow == 'Release' }}
        working-directory: ${{ inputs.openwrt_directory }}
        run: make download

      - name: Build Firmware
        working-directory: ${{ inputs.openwrt_directory }}
        run: make -j$(nproc) || make -j1 V=sc

      - name: Prepare Artifacts
        run: |
          mkdir output
          source ${{ inputs.ci_directory }}/${{ inputs.device }}/${{ inputs.version }}/device.settings
          cd ${{ inputs.openwrt_directory }}
          rsync -avm --include="config.buildinfo" \
                     --include="feeds.buildinfo" \
                     --include="profiles.json" \
                     --include="sha256sums" \
                     --include="version.buildinfo" \
                     --include="*$OPENWRT_TARGET_PROFILE*" \
                     --exclude="*" bin/targets/*/*/ ../output

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: openwrt-${{ inputs.device }}-${{ inputs.version }}
          path: output
